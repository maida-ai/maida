# Run fast unit tests on main and trusted stacked PRs.
name: Fast unittests

on:
  push:
    branches: [main]
    paths: &test_paths
      - pyproject.toml
      - uv.lock
      - pytest.toml
      - maida/**
      - tests/**
      - .github/workflows/**

  pull_request:
    paths: *test_paths

env:
  UV_VERSION: "0.11.14"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unittest-fast:
    if: >-
      ${{
        github.event_name == 'push' ||
        github.event.pull_request.base.ref == 'main' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run
            --all-extras
            --all-groups
          pytest
            --config-file=pytest.toml
            -vm "not slow and not long and not longrunning"
