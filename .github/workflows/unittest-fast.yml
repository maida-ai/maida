# Run unit tests on push and pull_request.
# Python 3.10+, uv-managed, pytest.
name: Fast unittests
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - maida/**
      - tests/**
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - pyproject.toml
      - maida/**
      - tests/**
      - .github/workflows/**

env:
  UV_VERSION: "0.11.14"

jobs:
  unittest-fast:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run
            --extra langchain
            --extra openai
            --extra crewai
          pytest
            --config-file=pytest.toml
            -vm "not slow and not long and not longrunning"
